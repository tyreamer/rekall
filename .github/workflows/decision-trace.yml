name: "Decision Trace"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    tags: ["v*.*.*"]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  post-trace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          
      - name: Post Decision Trace to PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/post_decision_trace.py
