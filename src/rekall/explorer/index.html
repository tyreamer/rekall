<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekall Forensic Explorer</title>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-0:#0a0a0b;--bg-1:#111113;--bg-2:#1a1a1e;--bg-3:#222228;
  --border:#2a2a30;--border-hover:#3a3a42;
  --text-0:#f0f0f2;--text-1:#a8a8b0;--text-2:#686870;
  --accent:#10b981;--accent-dim:#0d9668;--accent-bg:rgba(16,185,129,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.08);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.08);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,.08);
  --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,.08);
  --mono:'SF Mono','Cascadia Code','Fira Code',monospace;
  --sans:'Inter','SF Pro Display',-apple-system,sans-serif;
  --radius:6px;
}
body{background:var(--bg-0);color:var(--text-0);font-family:var(--sans);font-size:13px;line-height:1.5;overflow:hidden;height:100vh}
::selection{background:var(--accent);color:var(--bg-0)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* ── Layout ── */
#app{display:grid;grid-template-rows:48px 1fr;height:100vh}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--bg-1);border-bottom:1px solid var(--border);
  gap:16px;z-index:100;
}
.logo{font-weight:600;font-size:14px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-mark{width:18px;height:18px;border-radius:4px;background:var(--accent);opacity:.9}
.header-center{display:flex;align-items:center;gap:2px;background:var(--bg-2);border-radius:var(--radius);padding:2px}
.mode-btn{
  padding:5px 14px;border-radius:4px;border:none;cursor:pointer;
  font-size:12px;font-weight:500;font-family:var(--sans);
  background:transparent;color:var(--text-1);transition:all .15s;
}
.mode-btn.active{background:var(--bg-0);color:var(--text-0);box-shadow:0 1px 2px rgba(0,0,0,.3)}
.mode-btn:hover:not(.active){color:var(--text-0)}
.header-right{display:flex;align-items:center;gap:12px}
.search-box{
  background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);
  padding:5px 10px;color:var(--text-0);font-size:12px;font-family:var(--sans);width:220px;
  outline:none;transition:border-color .15s;
}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text-2)}
.stat-pill{
  font-size:11px;color:var(--text-1);background:var(--bg-2);
  padding:3px 8px;border-radius:10px;font-family:var(--mono);
}
.verify-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.verify-ok{background:var(--accent)}
.verify-fail{background:var(--red)}

/* ── Main ── */
main{display:grid;grid-template-columns:1fr 380px;overflow:hidden}
main.no-detail{grid-template-columns:1fr}

/* ── Ledger View ── */
#ledger{overflow:auto;position:relative}
.ledger-toolbar{
  position:sticky;top:0;z-index:10;background:var(--bg-1);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:6px 12px;gap:8px;
}
.filter-btn{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--text-1);cursor:pointer;font-family:var(--sans);
  transition:all .12s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--text-2);color:var(--text-0)}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.ledger-count{font-size:11px;color:var(--text-2);margin-left:auto;font-family:var(--mono)}

table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:38px;z-index:9}
th{
  text-align:left;padding:6px 12px;font-size:11px;font-weight:500;
  color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;
  background:var(--bg-1);border-bottom:1px solid var(--border);
}
td{
  padding:7px 12px;border-bottom:1px solid var(--bg-2);font-size:12px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:background .1s;
}
tr{cursor:pointer}
tr:hover td{background:var(--bg-2)}
tr.selected td{background:var(--accent-bg)}

.col-ts{width:140px;font-family:var(--mono);color:var(--text-1);font-size:11px}
.col-type{width:130px}
.col-actor{width:90px;color:var(--text-2);font-size:11px}
.col-summary{min-width:200px}
.col-verify{width:36px;text-align:center}
.col-hash{width:80px;font-family:var(--mono);font-size:10px;color:var(--text-2)}

/* ── Type Badges ── */
.badge{
  display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  font-family:var(--mono);
}
.badge-checkpoint{color:var(--accent);background:var(--accent-bg)}
.badge-session_end{color:var(--text-1);background:var(--bg-3)}
.badge-attempt_failed{color:var(--red);background:var(--red-bg)}
.badge-attempt_succeeded{color:var(--accent);background:var(--accent-bg)}
.badge-decision_proposed{color:var(--amber);background:var(--amber-bg)}
.badge-decision_decided{color:var(--blue);background:var(--blue-bg)}
.badge-wi_created,.badge-wi_patched{color:var(--cyan);background:var(--cyan-bg)}
.badge-head_move{color:var(--purple);background:var(--purple-bg)}
.badge-policyevaluation{color:var(--amber);background:var(--amber-bg)}
.badge-approvalrequired{color:var(--red);background:var(--red-bg)}
.badge-approvalgranted{color:var(--accent);background:var(--accent-bg)}
.badge-default{color:var(--text-2);background:var(--bg-3)}

.verify-icon{font-size:11px}
.verify-icon.ok{color:var(--accent)}
.verify-icon.none{color:var(--text-2);opacity:.3}

/* ── Detail Panel ── */
#detail{
  border-left:1px solid var(--border);background:var(--bg-1);overflow-y:auto;
  display:flex;flex-direction:column;
}
.detail-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.detail-header h3{font-size:13px;font-weight:600}
.detail-close{
  background:none;border:none;color:var(--text-2);cursor:pointer;
  font-size:16px;padding:2px 6px;border-radius:4px;
}
.detail-close:hover{background:var(--bg-2);color:var(--text-0)}
.detail-body{padding:16px;flex:1;overflow-y:auto}
.detail-section{margin-bottom:16px}
.detail-section h4{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.detail-value{font-size:12px;color:var(--text-0);word-break:break-all}
.detail-mono{font-family:var(--mono);font-size:11px;color:var(--text-1)}
.detail-raw{
  background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;font-family:var(--mono);font-size:10px;line-height:1.6;
  color:var(--text-1);overflow-x:auto;max-height:300px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-all;
}
.detail-badge{margin-bottom:4px}
.detail-related{display:flex;flex-wrap:wrap;gap:4px}
.related-chip{
  font-family:var(--mono);font-size:10px;color:var(--text-1);
  background:var(--bg-2);padding:2px 6px;border-radius:3px;cursor:pointer;
}
.related-chip:hover{color:var(--accent);background:var(--accent-bg)}

/* ── Lineage View ── */
#lineage{overflow:auto;position:relative;display:none}
.lineage-container{min-height:100%;padding:20px;position:relative}
svg.lineage-svg{width:100%;overflow:visible}
.lineage-node{cursor:pointer}
.lineage-node circle,.lineage-node rect,.lineage-node polygon{
  stroke-width:1.5;transition:all .15s;
}
.lineage-node:hover circle,.lineage-node:hover rect,.lineage-node:hover polygon{
  stroke-width:2.5;filter:brightness(1.2);
}
.lineage-node.selected circle,.lineage-node.selected rect,.lineage-node.selected polygon{
  stroke-width:3;filter:brightness(1.3);
}
.lineage-node text{font-family:var(--sans);font-size:10px;fill:var(--text-1);pointer-events:none}
.lineage-edge{stroke:var(--border);stroke-width:1;fill:none;opacity:.6}
.lineage-edge.causal{stroke:var(--accent);opacity:.4;stroke-dasharray:4,3}
.lineage-time-label{font-family:var(--mono);font-size:9px;fill:var(--text-2)}
.lineage-lane-label{font-family:var(--sans);font-size:10px;fill:var(--text-2);font-weight:500}
.lineage-tooltip{
  position:absolute;background:var(--bg-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 10px;font-size:11px;
  pointer-events:none;z-index:50;max-width:300px;
  box-shadow:0 4px 12px rgba(0,0,0,.4);display:none;
}
.lineage-tooltip .tt-type{font-weight:600;margin-bottom:2px}
.lineage-tooltip .tt-summary{color:var(--text-1)}
.lineage-tooltip .tt-ts{color:var(--text-2);font-family:var(--mono);font-size:10px}

/* ── Empty state ── */
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-2);font-size:14px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><div class="logo-mark"></div> Rekall Forensic Explorer</div>
    <div class="header-center">
      <button class="mode-btn active" data-mode="ledger">Ledger</button>
      <button class="mode-btn" data-mode="lineage">Lineage</button>
    </div>
    <div class="header-right">
      <input class="search-box" type="text" placeholder="Search events..." id="search">
      <span class="stat-pill" id="stat-events">-</span>
      <span class="stat-pill" id="stat-verify"><span class="verify-dot" id="verify-dot"></span>-</span>
    </div>
  </header>

  <main id="main">
    <!-- Ledger View -->
    <div id="ledger">
      <div class="ledger-toolbar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="checkpoint">Checkpoints</button>
        <button class="filter-btn" data-filter="attempt">Attempts</button>
        <button class="filter-btn" data-filter="decision">Decisions</button>
        <button class="filter-btn" data-filter="head_move">HEAD Moves</button>
        <button class="filter-btn" data-filter="wi_">Work Items</button>
        <button class="filter-btn" data-filter="policy">Policy</button>
        <span class="ledger-count" id="ledger-count"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th class="col-verify"></th>
            <th class="col-ts">Timestamp</th>
            <th class="col-type">Type</th>
            <th class="col-summary">Summary</th>
            <th class="col-actor">Actor</th>
            <th class="col-hash">Hash</th>
          </tr>
        </thead>
        <tbody id="ledger-body"></tbody>
      </table>
    </div>

    <!-- Lineage View (hidden by default) -->
    <div id="lineage">
      <div class="lineage-container" id="lineage-container"></div>
      <div class="lineage-tooltip" id="tooltip"></div>
    </div>

    <!-- Detail Panel -->
    <div id="detail" style="display:none">
      <div class="detail-header">
        <h3 id="detail-title">Event Detail</h3>
        <button class="detail-close" id="detail-close">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </main>
</div>

<script>
// ── State ──
let allEvents = [];
let filteredEvents = [];
let selectedId = null;
let currentMode = 'ledger';
let activeFilter = 'all';
let verifyResults = {};

// ── Init ──
async function init() {
  const [eventsRes, statsRes, verifyRes] = await Promise.all([
    fetch('/api/events').then(r => r.json()),
    fetch('/api/stats').then(r => r.json()),
    fetch('/api/verify').then(r => r.json()),
  ]);

  allEvents = eventsRes;
  verifyResults = verifyRes;

  document.getElementById('stat-events').textContent = `${allEvents.length} events`;

  const allOk = Object.values(verifyResults).every(v => !v.errors || v.errors.length === 0);
  const dot = document.getElementById('verify-dot');
  const verifyPill = document.getElementById('stat-verify');
  dot.className = 'verify-dot ' + (allOk ? 'verify-ok' : 'verify-fail');
  verifyPill.innerHTML = dot.outerHTML + (allOk ? 'Verified' : 'Issues');

  applyFilter();
}

// ── Filtering ──
function applyFilter() {
  const search = document.getElementById('search').value.toLowerCase();
  filteredEvents = allEvents.filter(e => {
    if (activeFilter !== 'all' && !e.type.includes(activeFilter)) return false;
    if (search && !e.summary.toLowerCase().includes(search) &&
        !e.id.toLowerCase().includes(search) &&
        !e.type.toLowerCase().includes(search)) return false;
    return true;
  });
  document.getElementById('ledger-count').textContent = `${filteredEvents.length} / ${allEvents.length}`;
  if (currentMode === 'ledger') renderLedger();
  if (currentMode === 'lineage') renderLineage();
}

// ── Badge helper ──
function badgeClass(type) {
  const t = type.replace(/[^a-z_]/g, '');
  const map = {
    checkpoint:'badge-checkpoint', session_end:'badge-session_end',
    attempt_failed:'badge-attempt_failed', attempt_succeeded:'badge-attempt_succeeded',
    decision_proposed:'badge-decision_proposed', decision_decided:'badge-decision_decided',
    wi_created:'badge-wi_created', wi_patched:'badge-wi_patched',
    head_move:'badge-head_move', policyevaluation:'badge-policyevaluation',
    approvalrequired:'badge-approvalrequired', approvalgranted:'badge-approvalgranted',
  };
  return map[t] || 'badge-default';
}

function badgeLabel(type) {
  return type.replace(/_/g, ' ');
}

// ── Ledger Rendering ──
function renderLedger() {
  const tbody = document.getElementById('ledger-body');
  const rows = filteredEvents.map(e => {
    const ts = e.timestamp ? e.timestamp.slice(0,19).replace('T',' ') : '';
    const hash = e.event_hash ? e.event_hash.slice(0,8) : '';
    const sel = e.id === selectedId ? ' selected' : '';
    const verIcon = e.verified ? '<span class="verify-icon ok">&#9679;</span>' : '<span class="verify-icon none">&#9675;</span>';
    return `<tr class="${sel}" data-id="${e.id}">
      <td class="col-verify">${verIcon}</td>
      <td class="col-ts">${ts}</td>
      <td class="col-type"><span class="badge ${badgeClass(e.type)}">${badgeLabel(e.type)}</span></td>
      <td class="col-summary">${esc(e.summary)}</td>
      <td class="col-actor">${esc(e.actor)}</td>
      <td class="col-hash">${hash}</td>
    </tr>`;
  });
  tbody.innerHTML = rows.join('');
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Detail Panel ──
function showDetail(event) {
  selectedId = event.id;
  const panel = document.getElementById('detail');
  const main = document.getElementById('main');
  panel.style.display = 'flex';
  main.classList.remove('no-detail');

  document.getElementById('detail-title').textContent = badgeLabel(event.type);
  const body = document.getElementById('detail-body');

  let html = '';
  html += `<div class="detail-section detail-badge"><span class="badge ${badgeClass(event.type)}">${badgeLabel(event.type)}</span></div>`;
  html += sec('Summary', event.summary);
  if (event.detail) html += sec('Detail', event.detail);
  html += sec('Timestamp', `<span class="detail-mono">${event.timestamp}</span>`);
  html += sec('Actor', event.actor);
  html += sec('Stream', event.stream);
  html += sec('ID', `<span class="detail-mono">${event.id}</span>`);

  if (event.git_sha) html += sec('Git SHA', `<span class="detail-mono">${event.git_sha}</span>`);

  if (event.event_hash) {
    html += sec('Integrity', `
      <div class="detail-mono">Hash: ${event.event_hash}</div>
      <div class="detail-mono" style="margin-top:2px">Prev: ${event.prev_hash || 'genesis'}</div>
      <div style="margin-top:4px"><span class="verify-icon ${event.verified?'ok':'none'}">${event.verified?'&#9679;':'&#9675;'}</span> ${event.verified?'Hash chain verified':'Not verified'}</div>
    `);
  }

  if (event.related_ids && event.related_ids.length) {
    html += `<div class="detail-section"><h4>Related</h4><div class="detail-related">${
      event.related_ids.map(id => `<span class="related-chip" data-id="${id}">${id.slice(0,12)}</span>`).join('')
    }</div></div>`;
  }

  html += `<div class="detail-section"><h4>Raw Event</h4><pre class="detail-raw">${esc(JSON.stringify(event.raw, null, 2))}</pre></div>`;

  body.innerHTML = html;
  renderLedger(); // Re-render to update selection
}

function sec(title, content) {
  return `<div class="detail-section"><h4>${title}</h4><div class="detail-value">${content}</div></div>`;
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detail').style.display = 'none';
  document.getElementById('main').classList.add('no-detail');
  renderLedger();
}

// ── Lineage Rendering ──
function renderLineage() {
  const container = document.getElementById('lineage-container');
  const events = filteredEvents.slice().reverse(); // Oldest first for left-to-right
  if (!events.length) { container.innerHTML = '<div class="empty-state">No events to display</div>'; return; }

  // Lane assignment by stream type
  const lanes = { timeline: 0, attempts: 1, decisions: 2, work_items: 3, head_moves: 4, activity: 5 };
  const laneLabels = { timeline: 'Timeline', attempts: 'Attempts', decisions: 'Decisions', work_items: 'Work Items', head_moves: 'HEAD', activity: 'Activity' };
  const usedLanes = new Set(events.map(e => e.stream));

  const nodeW = 120, nodeH = 52, padX = 60, padY = 70, headerH = 30;
  const laneMap = {};
  let laneIdx = 0;
  for (const [key, _] of Object.entries(lanes)) {
    if (usedLanes.has(key)) { laneMap[key] = laneIdx++; }
  }
  const totalLanes = laneIdx || 1;
  const svgW = events.length * (nodeW + padX) + padX * 2;
  const svgH = totalLanes * (nodeH + padY) + headerH + padY;

  // Build SVG
  let svg = `<svg class="lineage-svg" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">`;

  // Lane labels
  for (const [stream, li] of Object.entries(laneMap)) {
    const y = headerH + li * (nodeH + padY) + nodeH / 2 + 4;
    svg += `<text class="lineage-lane-label" x="10" y="${y}">${laneLabels[stream] || stream}</text>`;
  }

  // Time axis labels (sample every ~5 events)
  const step = Math.max(1, Math.floor(events.length / 10));
  for (let i = 0; i < events.length; i += step) {
    const x = padX * 2 + i * (nodeW + padX) + nodeW / 2;
    const ts = events[i].timestamp ? events[i].timestamp.slice(5,16).replace('T',' ') : '';
    svg += `<text class="lineage-time-label" x="${x}" y="${svgH - 6}" text-anchor="middle">${ts}</text>`;
  }

  // Edges: hash chain (prev_hash links within same stream)
  const hashIndex = {};
  events.forEach((e, i) => { if (e.event_hash) hashIndex[e.event_hash] = i; });
  events.forEach((e, i) => {
    if (e.prev_hash && hashIndex[e.prev_hash] !== undefined) {
      const pi = hashIndex[e.prev_hash];
      const x1 = padX * 2 + pi * (nodeW + padX) + nodeW;
      const y1 = headerH + (laneMap[events[pi].stream] || 0) * (nodeH + padY) + nodeH / 2;
      const x2 = padX * 2 + i * (nodeW + padX);
      const y2 = headerH + (laneMap[e.stream] || 0) * (nodeH + padY) + nodeH / 2;
      svg += `<path class="lineage-edge" d="M${x1},${y1} C${x1+30},${y1} ${x2-30},${y2} ${x2},${y2}"/>`;
    }
  });

  // Causal edges: related_ids
  const idIndex = {};
  events.forEach((e, i) => { idIndex[e.id] = i; });
  events.forEach((e, i) => {
    if (e.related_ids) {
      for (const rid of e.related_ids) {
        if (idIndex[rid] !== undefined && idIndex[rid] !== i) {
          const ri = idIndex[rid];
          const x1 = padX * 2 + Math.min(ri, i) * (nodeW + padX) + nodeW;
          const y1 = headerH + (laneMap[events[Math.min(ri, i)].stream] || 0) * (nodeH + padY) + nodeH / 2;
          const x2 = padX * 2 + Math.max(ri, i) * (nodeW + padX);
          const y2 = headerH + (laneMap[events[Math.max(ri, i)].stream] || 0) * (nodeH + padY) + nodeH / 2;
          svg += `<path class="lineage-edge causal" d="M${x1},${y1} C${x1+25},${y1} ${x2-25},${y2} ${x2},${y2}"/>`;
        }
      }
    }
  });

  // Nodes
  events.forEach((e, i) => {
    const x = padX * 2 + i * (nodeW + padX);
    const y = headerH + (laneMap[e.stream] || 0) * (nodeH + padY);
    const sel = e.id === selectedId ? ' selected' : '';
    const shape = nodeShape(e, x, y);
    const label = e.summary ? e.summary.slice(0, 16) + (e.summary.length > 16 ? '...' : '') : e.type;
    svg += `<g class="lineage-node${sel}" data-id="${e.id}" data-idx="${i}">
      ${shape}
      <text x="${x + nodeW/2}" y="${y + nodeH + 14}" text-anchor="middle">${escSvg(label)}</text>
    </g>`;
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // Scroll to rightmost (latest) on first render
  container.scrollLeft = container.scrollWidth;
}

function nodeShape(e, x, y) {
  const w = 120, h = 52, r = 6;
  const colors = {
    checkpoint: { fill: 'var(--accent-bg)', stroke: 'var(--accent)' },
    attempt_failed: { fill: 'var(--red-bg)', stroke: 'var(--red)' },
    attempt_succeeded: { fill: 'var(--accent-bg)', stroke: 'var(--accent)' },
    decision_proposed: { fill: 'var(--amber-bg)', stroke: 'var(--amber)' },
    decision_decided: { fill: 'var(--blue-bg)', stroke: 'var(--blue)' },
    head_move: { fill: 'var(--purple-bg)', stroke: 'var(--purple)' },
    session_end: { fill: 'var(--bg-3)', stroke: 'var(--text-2)' },
  };
  const c = colors[e.type] || { fill: 'var(--bg-3)', stroke: 'var(--border-hover)' };

  // Different shapes by type
  if (e.type.startsWith('attempt_failed')) {
    // Diamond for failures
    const cx = x + w/2, cy = y + h/2;
    return `<polygon points="${cx},${y} ${x+w},${cy} ${cx},${y+h} ${x},${cy}" fill="${c.fill}" stroke="${c.stroke}"/>`;
  }
  if (e.type === 'head_move') {
    // Circle for HEAD moves
    return `<circle cx="${x+w/2}" cy="${y+h/2}" r="${h/2}" fill="${c.fill}" stroke="${c.stroke}"/>`;
  }
  // Rounded rect for everything else
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${c.fill}" stroke="${c.stroke}"/>`;
}

function escSvg(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

// ── Event Handlers ──

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;

    document.getElementById('ledger').style.display = currentMode === 'ledger' ? 'block' : 'none';
    document.getElementById('lineage').style.display = currentMode === 'lineage' ? 'block' : 'none';
    applyFilter();
  });
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

// Search
document.getElementById('search').addEventListener('input', () => applyFilter());

// Ledger row clicks
document.getElementById('ledger-body').addEventListener('click', (e) => {
  const tr = e.target.closest('tr');
  if (!tr) return;
  const id = tr.dataset.id;
  const event = allEvents.find(ev => ev.id === id);
  if (event) showDetail(event);
});

// Lineage node clicks
document.getElementById('lineage-container').addEventListener('click', (e) => {
  const node = e.target.closest('.lineage-node');
  if (!node) return;
  const id = node.dataset.id;
  const event = allEvents.find(ev => ev.id === id);
  if (event) {
    showDetail(event);
    // If switching to ledger, scroll to the row
    if (currentMode === 'lineage') renderLineage();
  }
});

// Lineage tooltip
document.getElementById('lineage-container').addEventListener('mousemove', (e) => {
  const node = e.target.closest('.lineage-node');
  const tooltip = document.getElementById('tooltip');
  if (!node) { tooltip.style.display = 'none'; return; }
  const idx = parseInt(node.dataset.idx);
  const ev = filteredEvents.slice().reverse()[idx];
  if (!ev) { tooltip.style.display = 'none'; return; }
  const ts = ev.timestamp ? ev.timestamp.slice(0,19).replace('T',' ') : '';
  tooltip.innerHTML = `<div class="tt-type">${badgeLabel(ev.type)}</div><div class="tt-summary">${esc(ev.summary)}</div><div class="tt-ts">${ts}</div>`;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});
document.getElementById('lineage-container').addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

// Detail close
document.getElementById('detail-close').addEventListener('click', closeDetail);

// Related chip clicks
document.getElementById('detail-body').addEventListener('click', (e) => {
  const chip = e.target.closest('.related-chip');
  if (!chip) return;
  const id = chip.dataset.id;
  const event = allEvents.find(ev => ev.id === id);
  if (event) showDetail(event);
});

// Keyboard: Escape to close detail
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// Start
init();
</script>
</body>
</html>
